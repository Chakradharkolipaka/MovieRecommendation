version: "3.9"

services:
  backend:
    build: ./backend
    container_name: movie-recommender-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env.example

  frontend:
    build: ./frontend
    container_name: movie-recommender-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
